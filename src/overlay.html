<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; media-src blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="overlay.css" />
    <title>Tristr Flow</title>
  </head>
  <body>
    <div id="card">
      <header id="bar">
        <button id="settings" title="Settings (Preferences)" aria-label="Settings">&#9881;&#xFE0E;</button>
        <div id="center">
          <button id="playpause" title="Play / Pause (Space)">❚❚</button>
          <div id="meta">
            <span id="dot"></span>
            <span id="voice">Voice</span>
            <span id="status">Preparing…</span>
          </div>
        </div>
        <div id="rightctl">
          <div id="speedctl" title="Reading speed (← / →)">
            <button id="speeddown" aria-label="Slower">‹</button>
            <span id="speedval">1×</span>
            <button id="speedup" aria-label="Faster">›</button>
          </div>
          <button id="close" title="Stop &amp; close (Esc)" aria-label="Close">✕</button>
        </div>
      </header>

      <div id="textwrap">
        <div id="text"></div>
      </div>

      <div id="progress"><div id="bar-fill"></div></div>
    </div>
    <script src="richtext.js"></script>
    <script src="overlay.js"></script>
  </body>
</html>
