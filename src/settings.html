<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; media-src data:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <link rel="stylesheet" href="settings.css" />
    <title>Tristr Flow — Preferences</title>
  </head>
  <body>
    <header id="head">
      <div>
        <h1>Tristr Flow</h1>
        <p id="sub">Choose a voice and reading speed</p>
      </div>
      <span id="keystate" class="badge"></span>
    </header>

    <div id="searchwrap">
      <input id="search" type="text" placeholder="Search voices…" autocomplete="off" />
    </div>

    <div id="list" aria-label="Voices"></div>

    <footer id="foot">
      <div id="accountrow">
        <div class="acct-head">
          <label>Account</label>
          <span id="acctinfo" class="acct-info">Checking…</span>
        </div>
        <div id="acctsignedout" hidden>
          <div class="acct-fields">
            <input id="acctemail" type="email" placeholder="you@email.com" autocomplete="username" />
            <input id="acctpass" type="password" placeholder="Password (8+ characters)" autocomplete="current-password" />
          </div>
          <div class="acct-btns">
            <button id="btnlogin" class="acct-primary">Sign in</button>
            <button id="btnsignup" class="acct-ghost">Create account</button>
          </div>
          <details id="ownkeywrap">
            <summary>Use my own ElevenLabs key instead (no account)</summary>
            <div class="acct-fields">
              <input id="ownkey" type="password" placeholder="sk_…" autocomplete="off" />
              <button id="btnownkey" class="acct-ghost">Save key</button>
            </div>
          </details>
          <p id="acctmsg" class="acct-msg"></p>
        </div>
        <div id="acctsignedin" hidden>
          <button id="btnupgrade" class="acct-primary" hidden>Upgrade to Pro ↗</button>
          <button id="btnbilling" class="acct-ghost" hidden>Manage plan ↗</button>
          <button id="btnlogout" class="acct-ghost">Sign out</button>
          <button id="btnclearkey" class="acct-ghost" hidden>Remove my key</button>
        </div>
      </div>

      <div id="shortcuts">
        <div class="sc-row">
          <label>Shortcut</label>
          <kbd class="combo" id="combo1">…</kbd>
          <button class="rec" data-which="1">Change</button>
        </div>
        <div class="sc-row">
          <label>Also</label>
          <kbd class="combo" id="combo2">…</kbd>
          <button class="rec" data-which="2">Change</button>
          <button class="clr" data-which="2" title="Remove this shortcut">✕</button>
        </div>
        <p id="schint">Click Change, then press your key combo (needs a modifier, e.g. ⌃⇧Space).</p>
      </div>

      <div id="stabilityrow">
        <label>Voice</label>
        <div id="stability" class="segmented" role="group" aria-label="Voice stability">
          <button type="button" data-val="0">Creative</button>
          <button type="button" data-val="0.5">Natural</button>
          <button type="button" data-val="1">Robust</button>
        </div>
      </div>
      <p id="stabilityhint">Lower = more expressive · Higher = steadier (fixes weird/unstable audio)</p>

      <div id="textsizerow">
        <label for="fontsize">Text size</label>
        <input id="fontsize" type="range" min="13" max="34" step="1" value="20" />
        <span id="fontsizeval">20 px</span>
      </div>

      <div id="themerow">
        <label>Appearance</label>
        <div id="theme" class="segmented" role="group" aria-label="Appearance">
          <button type="button" data-val="system">Auto</button>
          <button type="button" data-val="light">Light</button>
          <button type="button" data-val="dark">Dark</button>
        </div>
      </div>

      <div id="speedrow">
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="0.7" max="2.5" step="0.05" value="1.0" />
        <span id="speedval">1.0×</span>
      </div>

      <label id="pausemusicrow">
        <input type="checkbox" id="pausemusic" />
        <span>Pause music (Spotify / Apple Music) while reading</span>
      </label>
    </footer>

    <script src="settings-renderer.js"></script>
  </body>
</html>
